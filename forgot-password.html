<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password • BlankMarket</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body class="auth-page">

<div class="auth-container">

    <div class="logo-auth">
        BlankMarket
    </div>

    <h1>Forgot Password?</h1>

    <p class="subtitle">
        Enter your email address or phone number and we'll send you an OTP to reset your password.
    </p>

    <form>

        <div class="input-group">
            <label>Email Address or Phone Number</label>
            <input type="text" id="reset-contact" placeholder="you@example.com or +234 801 234 5678" required>
        </div>

        <button type="button" class="primary-btn" onclick="sendOTP()">
            Send OTP
        </button>

    </form>

    <div class="divider">
        <span>or</span>
    </div>

    <a href="login.html" class="secondary-btn">
        Back to Login
    </a>

</div>

<script>
function sendOTP() {
    const contact = document.getElementById('reset-contact').value.trim();

    if (!contact) {
        BlankMarket.showToast("Please enter your email or phone number", "error");
        return;
    }

    // Simulate sending OTP
    BlankMarket.showToast("OTP has been sent! (Check your email/SMS)");

    setTimeout(() => {
        // In a real app, we would navigate to OTP verification page
        // For now, we show a success message and redirect back to login
        alert("For demo purposes: OTP sent successfully.\n\nIn a real app, you would enter the OTP on the next screen.");
        window.location.href = "login.html";
    }, 1800);
}
</script>

</body>
</html>
