<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders • BlankMarket</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body>

    <header class="main-header">
        <button id="menu-btn">☰</button>
        <div class="logo">BlankMarket</div>
        <a href="checkout.html" class="login-icon">🛒</a>
    </header>

    <nav id="nav-drawer">
        <ul>
            <li>
                <button class="accordion">Overview ▾</button>
                <ul class="submenu">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="orders.html">Orders</a></li>
                    <li><a href="Transaction-history.html">Transaction History</a></li>
                    <li><a href="profile-setup.html">Profile Settings</a></li>
                </ul>
            </li>
            <li>
                <button class="accordion">Our Products ▾</button>
                <ul class="submenu">
                    <li><a href="marketplace.html">Social Media</a></li>
                    <li><a href="marketplace.html">Proxies</a></li>
                    <li><a href="marketplace.html">Texting Numbers</a></li>
                    <li><a href="marketplace.html">eSIM</a></li>
                </ul>
            </li>
        </ul>
    </nav>
    <div id="overlay"></div>

    <div class="content" style="max-width:620px; margin:0 auto; padding-top:30px;">
        <h1 style="color:var(--primary); margin-bottom:24px;">My Orders</h1>

        <div id="orders-list">
            <!-- Dynamic orders will be loaded here by JavaScript -->
        </div>

        <div style="text-align:center; margin-top:40px;">
            <a href="marketplace.html" class="buy-btn" style="max-width:260px; margin:auto;">Browse More Products</a>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const navDrawer = document.getElementById('nav-drawer');
        const overlay = document.getElementById('overlay');

        function toggleDrawer() {
            navDrawer.classList.toggle('open');
            overlay.style.display = navDrawer.classList.contains('open') ? 'block' : 'none';
        }

        menuBtn.addEventListener('click', toggleDrawer);
        overlay.addEventListener('click', toggleDrawer);

        document.querySelectorAll('.accordion').forEach(btn => {
            btn.addEventListener('click', () => {
                const submenu = btn.nextElementSibling;
                submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
            });
        });
    </script>

<script>
function loadOrders() {
    const container = document.getElementById('orders-list');
    const orders = BlankMarket.getOrders();

    if (!container) return;

    if (orders.length === 0) {
        container.innerHTML = `
            <div class="card" style="text-align:center; padding:40px 20px;">
                <p style="color:var(--text-light);">You have no orders yet.</p>
                <a href="marketplace.html" class="buy-btn" style="max-width:200px; margin:20px auto 0;">Start Shopping</a>
            </div>
        `;
        return;
    }

    container.innerHTML = orders.map(order => {
        const date = new Date(order.date).toLocaleDateString('en-GB', { 
            day: 'numeric', month: 'short', year: 'numeric' 
        });
        return `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <div>
                        <strong>${order.name}</strong><br>
                        <span style="color:var(--text-light); font-size:13px;">Order #${order.id} • ${date}</span>
                    </div>
                    <div style="text-align:right;">
                        <div style="color:var(--primary); font-weight:700;">₦${order.price.toLocaleString()}</div>
                        <span class="tx-status" style="background:#166534; color:#4ade80; font-size:12px;">${order.status}</span>
                    </div>
                </div>
                <div style="font-size:13px; color:#666;">Thank you for your purchase. Details sent to your email.</div>
            </div>
        `;
    }).join('');
}

document.addEventListener('DOMContentLoaded', () => {
    if (!BlankMarket.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
    }
    loadOrders();
});
</script>
</body>
</html>
